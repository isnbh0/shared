env: timestamp
target_skill: macros:timestamp                       # the marketplace skill being optimized
initial_skill: skills/timestamp/initial.md
inject_skill_as: .agents/skills/timestamp/SKILL.md   # candidate doc dropped into the rollout workspace
tasks_dir: tasks/timestamp

providers:
  rollout: claude        # rollouts billed to the Claude subscription
  reflect: codex         # reflect/judge on the second identity
reasoning_effort: high   # codex model_reasoning_effort (minimal|low|medium|high)

rollout:
  n_samples: 3
  timeout: 600.0

train:
  batch_size: 4
  resample: true         # train MAY resample across steps/epochs
  split_seed: 20260629

val:
  frozen: true           # val split is fixed; never resampled

loader:
  val_fraction: 0.34

scorer:
  kind: deterministic
  prefix_regex: '^\d{6}-\d{6}-'
  min_artifacts: 1

gate:
  mode: variance         # see Phase 5

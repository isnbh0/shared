# Before→after SkillOpt demo: SearchQA, fully on the codex (ChatGPT) subscription.
# target = codex_exec, optimizer = codex_chat (the vendored fork's CLI optimizer).
# Launched via skillopt-oauth so the env scrub + OAuth preflight keep it off any
# metered API. Models are gpt-5.5, the codex/upstream default (configs/_base_/default.yaml);
# set model.optimizer/model.target to a slug your subscription serves.
_base_: ../../vendor/skillopt/configs/_base_/default.yaml

model:
  optimizer: gpt-5.5
  target: gpt-5.5
  optimizer_backend: codex_chat        # vendored fork: CLI optimizer on the subscription
  target_backend: codex_exec
  reasoning_effort: low
  codex_exec_reasoning_effort: low
  codex_exec_sandbox: workspace-write   # target writes task.md/SKILL.md into its workspace
  codex_trace_to_optimizer: false       # smaller optimizer prompts for the demo

train:
  num_epochs: 1
  train_size: 3                         # == train-split item count
  batch_size: 1
  accumulation: 1
  seed: 0

gradient:
  minibatch_size: 1
  merge_batch_size: 1
  analyst_workers: 1
  max_analyst_rounds: 1
  failure_only: false

optimizer:
  learning_rate: 2                      # edit_budget (max edits/step)
  min_learning_rate: 2
  lr_scheduler: constant
  lr_control_mode: fixed
  skill_update_mode: patch              # deterministic apply, no extra optimizer call
  use_slow_update: false
  use_meta_skill: false

evaluation:
  use_gate: true                        # mandatory in this branch
  gate_metric: soft                     # accept incremental F1 gains on a tiny split
  sel_env_num: 3                        # == val count
  test_env_num: 2                       # == test count
  eval_test: true

env:
  name: searchqa
  # paths are relative to tooling/skillopt, the documented run CWD (see README "Reproduce")
  skill_init: demo/searchqa_codex/seed_skill_bad.md
  split_mode: split_dir
  split_dir: demo/searchqa_codex/data
  data_path: ""
  max_turns: 1
  max_completion_tokens: 16384
  workers: 4
  exec_timeout: 180
  limit: 0
